000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="82.6396" x="14" y="237.5264">FPGA / MCU</text><polygon fill="#F1F1F1" points="141.7588,259.8281,281.998,259.8281,293.998,271.8281,281.998,283.8281,141.7588,283.8281,129.7588,271.8281,141.7588,259.8281" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="140.2393" x="141.7588" y="275.6362">Softcore already flashed?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="19.0083" x="110.7505" y="269.2339">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.7017" x="293.998" y="269.2339">no</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="181.625" x="23" y="293.8281"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="161.625" x="33" y="314.9668">MCU image stays on board</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="170.6387" x="224.625" y="293.8281"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="150.6387" x="234.625" y="314.9668">Connect Basys-3 via USB</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="161.9668" x="228.9609" y="347.7969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="141.9668" x="238.9609" y="368.9355">Run `cargo xtask flash`</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="139.1504" x="240.3691" y="401.7656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="119.1504" x="250.3691" y="422.9043">Program FPGA flash</text><rect fill="#F1F1F1" height="33.