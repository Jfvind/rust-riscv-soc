name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      com_port:
        description: "Serial port for the FPGA hardware test (overrides the FPGA_COM_PORT repo variable)"
        required: false
        default: ""

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 0: Rust build, lint, and host unit tests (Github cloud)
  # Runs the uploader protocol tests, and compile-checks the on-device program.
  # ────────────────────────────────────────────────────────────
  rust:
    name: Rust Build & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32i-unknown-none-elf
          components: rustfmt, clippy

      - name: Install serialport build deps
        # The uploader depends on `serialport`, which needs libudev + pkg-config on Linux.
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rust formatting
        run: cargo fmt --check

      - name: Clippy (host tools)
        run: cargo clippy -p uploader -p xtask -- -D warnings

      - name: Unit tests (uploader protocol + xtask)
        run: cargo test -p uploader -p xtask

      - name: Compile-check MCU HAL crate
        run: cargo check -p mcu-hal --target riscv32i-unknown-none-elf

      - name: Compile-check MCU runtime crate
        run: cargo check -p mcu-rt --target riscv32i-unknown-none-elf

      - name: Compile-check on-device program (RISC-V target)
        run: cargo build -p program --target riscv32i-unknown-none-elf --release

      - name: Build HAL API docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p mcu-hal --target riscv32i-unknown-none-elf --no-deps

  # ────────────────────────────────────────────────────────────
  # Job 1: Simulation tests (in Github cloud)
  # Runs the Wildcat simulation tests via cargo xtask
  # ────────────────────────────────────────────────────────────
  simulate:
    name: Chisel Simulation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install RISC-V toolchain
        # Use bare-metal gcc-riscv64-unknown-elf (universe repo) for correct bare-metal C compilation.
        # binutils-riscv64-unknown-elf doesn't exist on Ubuntu 24.04, so use linux-gnu binutils
        # and symlink them to the expected riscv64-unknown-elf-* names.
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update && sudo apt-get install -y binutils-riscv64-linux-gnu gcc-riscv64-unknown-elf
          # Symlink every riscv64-linux-gnu-* binutils tool that isn't already provided
          # by gcc-riscv64-unknown-elf (i.e. as, ld, objcopy, objdump, etc.).
          for f in /usr/bin/riscv64-linux-gnu-*; do
            name="riscv64-unknown-elf-${f##*riscv64-linux-gnu-}"
            command -v "$name" &>/dev/null || sudo ln -s "$f" "/usr/local/bin/$name"
          done

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            wildcat/target
            wildcat/project/target
          key: ${{ runner.os }}-sbt-${{ hashFiles('wildcat/build.sbt', 'wildcat/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Run all simulation tests
        run: cargo xtask sim-test

      - name: Generate Verilog (verify RustSoCTop compiles)
        working-directory: wildcat
        run: sbt "runMain rvsoc.RustSoCTopGen"

      - name: Upload generated Verilog as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-verilog
          path: wildcat/generated/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2: Hardware-in-the-loop tests (Github runner)
  # Uploads a test binary via UART.
  # Only runs after simulation passes.
  # ────────────────────────────────────────────────────────────
  hardware-test:
    name: FPGA Hardware Test
    needs: [rust, simulate]
    runs-on: [self-hosted, fpga]
    # Run on PRs to main, or on manual dispatch (so the board can be exercised
    # on demand). Not on push.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Rust test binary
        run: cargo xtask build-rust

      # Serial port precedence: manual dispatch input, then the FPGA_COM_PORT
      # repo variable, then COM4. Set FPGA_COM_PORT (repo Settings -> Variables)
      # to this runner's board so the YAML never needs editing.
      - name: Upload test binary and verify UART output
        run: cargo xtask hw-test ${{ inputs.com_port || vars.FPGA_COM_PORT || 'COM4' }}
