name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Simulation tests (in Github cloud)
  # Runs sbt test on the Wildcat tests
  # ────────────────────────────────────────────────────────────
  simulate:
    name: Chisel Simulation Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wildcat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install RISC-V toolchain
        # gcc-riscv64-unknown-elf is not available on Ubuntu 24.04+; use linux-gnu packages instead.
        # Symlink riscv64-unknown-elf-* so external Makefiles (e.g. risc-v-lab) find the expected names.
        run: |
          sudo apt-get update && sudo apt-get install -y binutils-riscv64-linux-gnu gcc-riscv64-linux-gnu
          # Symlink every riscv64-linux-gnu-* tool to riscv64-unknown-elf-* so external
          # Makefiles (e.g. risc-v-lab) find the expected names on Ubuntu 24.04+.
          for f in /usr/bin/riscv64-linux-gnu-*; do
            sudo ln -s "$f" "/usr/local/bin/riscv64-unknown-elf-${f##*riscv64-linux-gnu-}"
          done

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            wildcat/target
            wildcat/project/target
          key: ${{ runner.os }}-sbt-${{ hashFiles('wildcat/build.sbt', 'wildcat/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Clone RISC-V test vectors
        run: |
          if [ ! -d "risc-v-lab" ]; then
            make risc-v-lab
          fi

      - name: Run all simulation tests
        run: sbt test

      - name: Generate Verilog (verify RustSoCTop compiles)
        run: sbt "runMain rvsoc.RustSoCTopGen"

      - name: Upload generated Verilog as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-verilog
          path: wildcat/generated/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2: Hardware-in-the-loop tests (Github runner)
  # Uploads a test binary via UART.
  # Only runs after simulation passes.
  # ────────────────────────────────────────────────────────────
  hardware-test:
    name: FPGA Hardware Test
    needs: simulate
    runs-on: [self-hosted, fpga]
    # Only run on PRs to main (not on push)
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Rust test binary
        run: make rust-build

      - name: Install Python dependencies
        run: pip install -r sw/loader/requirements.txt

      - name: Upload test binary and verify UART output
        run: make hw-test
