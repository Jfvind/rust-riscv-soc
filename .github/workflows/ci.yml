name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1: Simulation tests (in Github cloud)
  # Runs sbt test on the Wildcat tests
  # ────────────────────────────────────────────────────────────
  simulate:
    name: Chisel Simulation Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wildcat

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install RISC-V toolchain
        # Use bare-metal gcc-riscv64-unknown-elf (universe repo) for correct bare-metal C compilation.
        # binutils-riscv64-unknown-elf doesn't exist on Ubuntu 24.04, so use linux-gnu binutils
        # and symlink them to the expected riscv64-unknown-elf-* names.
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update && sudo apt-get install -y binutils-riscv64-linux-gnu gcc-riscv64-unknown-elf
          # Symlink every riscv64-linux-gnu-* binutils tool that isn't already provided
          # by gcc-riscv64-unknown-elf (i.e. as, ld, objcopy, objdump, etc.).
          for f in /usr/bin/riscv64-linux-gnu-*; do
            name="riscv64-unknown-elf-${f##*riscv64-linux-gnu-}"
            command -v "$name" &>/dev/null || sudo ln -s "$f" "/usr/local/bin/$name"
          done

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
            wildcat/target
            wildcat/project/target
          key: ${{ runner.os }}-sbt-${{ hashFiles('wildcat/build.sbt', 'wildcat/project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Clone RISC-V test vectors
        run: |
          if [ ! -d "risc-v-lab" ]; then
            make risc-v-lab
          fi

      - name: Run all simulation tests
        run: sbt test

      - name: Generate Verilog (verify RustSoCTop compiles)
        run: sbt "runMain rvsoc.RustSoCTopGen"

      - name: Upload generated Verilog as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-verilog
          path: wildcat/generated/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # Job 2: Hardware-in-the-loop tests (Github runner)
  # Uploads a test binary via UART.
  # Only runs after simulation passes.
  # ────────────────────────────────────────────────────────────
  hardware-test:
    name: FPGA Hardware Test
    needs: simulate
    runs-on: [self-hosted, fpga]
    # Only run on PRs to main (not on push)
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Rust test binary
        run: make rust-build

      - name: Install Python dependencies
        run: pip install -r sw/loader/requirements.txt

      - name: Upload test binary and verify UART output
        run: make hw-test
